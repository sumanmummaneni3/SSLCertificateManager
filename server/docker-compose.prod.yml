# Production override — replaces the local build with the pre-built image from
# GitHub Container Registry. Use on the VPS instead of docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Set GHCR_IMAGE in your .env file:
#   GHCR_IMAGE=ghcr.io/YOUR_GITHUB_USERNAME/certguard

services:
  app:
    image: ${GHCR_IMAGE}:latest
    build: !reset null
