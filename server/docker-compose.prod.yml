# Production override — replaces the local build with the pre-built image from
# GitHub Container Registry. Use on the VPS instead of docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required .env entries:
#   GHCR_IMAGE=ghcr.io/YOUR_GITHUB_USERNAME/certguard-app
#   GHCR_AUTH_IMAGE=ghcr.io/YOUR_GITHUB_USERNAME/certguard-auth-service
#   GHCR_GATEWAY_IMAGE=ghcr.io/YOUR_GITHUB_USERNAME/certguard-gateway
#   GHCR_UI_IMAGE=ghcr.io/YOUR_GITHUB_USERNAME/certguard-ui

services:
  app:
    image: ${GHCR_IMAGE}:latest
    build: !reset null

  auth-service:
    image: ${GHCR_AUTH_IMAGE}:latest
    build: !reset null

  gateway:
    image: ${GHCR_GATEWAY_IMAGE}:latest
    build: !reset null

  ui:
    image: ${GHCR_UI_IMAGE}:latest
    build: !reset null
