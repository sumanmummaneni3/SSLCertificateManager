spring:
  application:
    name: certguard-cloud
  web:
    resources:
      add-mappings: true
      static-locations: classpath:/static/
      cache:
        period: 3600
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/certguard}
    username: ${SPRING_DATASOURCE_USERNAME:certguard_user}
    password: ${SPRING_DATASOURCE_PASSWORD:certguard_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
  flyway:
    enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_DEFAULT_USER:certguard_rmq}
    password: ${RABBITMQ_DEFAULT_PASS:certguard_rmq_pass}
    virtual-host: ${RABBITMQ_VHOST:/certguard}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:mock-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:mock-client-secret}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:noreply@certguard.cloud}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  dev-mode: ${APP_DEV_MODE:false}
  jwt:
    secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
    expiration-ms: 86400000
  base-url: ${APP_BASE_URL:http://localhost:8080}
  async:
    core-pool-size: 4
    max-pool-size: 10
    queue-capacity: 50
  platform-admin:
    # Comma-separated list of Google-authenticated emails that receive PLATFORM_ADMIN role.
    # Set via environment variable: PLATFORM_ADMIN_EMAILS=you@yourdomain.com
    emails: ${PLATFORM_ADMIN_EMAILS:}
  alert:
    warning-days: ${ALERT_THRESHOLD_WARNING_DAYS:30}
    critical-days: ${ALERT_THRESHOLD_CRITICAL_DAYS:7}
    schedule-cron: ${ALERT_SCHEDULE_CRON:0 0 8 * * *}
    # Minimum hours between repeated alerts for the same certificate record.
    # Prevents alert storms on long-expired certificates. Default: 23h (just
    # under the daily schedule interval so a cert missed one day is caught next).
    dedup-hours: ${ALERT_DEDUP_HOURS:23}
  scanning:
    public:
      thread-pool-size: 20
      connect-timeout-ms: 10000
      handshake-timeout-ms: 15000
      retry-max-attempts: 3
      schedule-cron: "0 0 2 * * *"
  agent:
    offline-threshold-minutes: ${AGENT_OFFLINE_THRESHOLD_MINUTES:10}
    offline-check-interval-ms: ${AGENT_OFFLINE_CHECK_INTERVAL_MS:300000}
    cert:
      validity-days: 365
    bundle:
      download-url-ttl-seconds: ${AGENT_BUNDLE_DOWNLOAD_URL_TTL_SECONDS:3600}
      argon2:
        memory-kib: ${AGENT_BUNDLE_ARGON2_MEMORY_KIB:65536}
        iterations: ${AGENT_BUNDLE_ARGON2_ITERATIONS:3}
        parallelism: ${AGENT_BUNDLE_ARGON2_PARALLELISM:1}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false

logging:
  level:
    com.certguard: INFO
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8443
  ssl:
    enabled: true
    key-store: /opt/certguard/certs/certguard.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:certguard123}
    key-store-type: PKCS12
    key-alias: certguard
    enabled-protocols: TLSv1.2,TLSv1.3
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

  agent:
    ca:
      cert-path: ${AGENT_CA_CERT_PATH:/opt/certguard/certs/agent-ca.pem}
      key-path:  ${AGENT_CA_KEY_PATH:/opt/certguard/certs/agent-ca-key.pem}
    cert:
      validity-days: 365
