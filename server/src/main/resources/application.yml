spring:
  application:
    name: certguard-cloud
  threads:
    virtual:
      enabled: true
  web:
    resources:
      add-mappings: true
      static-locations: classpath:/static/
      cache:
        period: 3600
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/certguard}
    username: ${SPRING_DATASOURCE_USERNAME:certguard_user}
    password: ${SPRING_DATASOURCE_PASSWORD:certguard_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:mock-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:mock-client-secret}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  dev-mode: ${APP_DEV_MODE:false}
  # The release tag used to resolve artifact-url-template. Defaults to "latest".
  release-tag: ${APP_RELEASE_TAG:latest}
  sales:
    webhook:
      url: ${SALES_WEBHOOK_URL:}
      secret: ${SALES_WEBHOOK_SECRET:}
      timeout-ms: ${SALES_WEBHOOK_TIMEOUT_MS:5000}
      max-retries: ${SALES_WEBHOOK_MAX_RETRIES:3}
  mail:
    from: ${MAIL_FROM:noreply@certguard.cloud}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 28800000
  cors:
    # Comma-separated list of allowed origins for CORS.
    # In production, set APP_CORS_ALLOWED_ORIGINS to your exact frontend URL(s),
    # e.g. APP_CORS_ALLOWED_ORIGINS=https://app.certguard.cloud
    # If left empty and app.dev-mode=false, the server will refuse to start.
    # The dev default (http://localhost:5173) is only used when app.dev-mode=true.
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  # Public origin of the React SPA / nginx (used in invite email links).
  # Must be the URL the invitee's browser reaches — NOT the internal server port.
  # Defaults to app.base-url so local dev (server serves the SPA) works out of the box.
  # In production set APP_UI_BASE_URL=https://app.example.com separately from APP_BASE_URL.
  ui-base-url: ${APP_UI_BASE_URL:${app.base-url}}
  async:
    core-pool-size: 4
    max-pool-size: 10
    queue-capacity: 50
  platform-admin:
    # Comma-separated list of Google-authenticated emails that receive PLATFORM_ADMIN role.
    # Set via environment variable: PLATFORM_ADMIN_EMAILS=you@yourdomain.com
    emails: ${PLATFORM_ADMIN_EMAILS:}
  renewal-service:
    url: ${RENEWAL_SERVICE_URL:http://renewal-service:8444}
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN:}
  alert:
    warning-days: ${ALERT_THRESHOLD_WARNING_DAYS:30}
    critical-days: ${ALERT_THRESHOLD_CRITICAL_DAYS:7}
    schedule-cron: ${ALERT_SCHEDULE_CRON:0 0 8 * * *}
    # Minimum hours between repeated alerts for the same certificate record.
    # Prevents alert storms on long-expired certificates. Default: 23h (just
    # under the daily schedule interval so a cert missed one day is caught next).
    dedup-hours: ${ALERT_DEDUP_HOURS:23}
    # Minimum seconds between FORCE (manual) scan alerts for the same target.
    # Prevents alert spam from rapid back-to-back force scans. Applied at
    # evaluation time against the target's prior lastScannedAt (RFC 0008 §5).
    force-scan-debounce-seconds: ${ALERT_FORCE_SCAN_DEBOUNCE_SECONDS:120}
  scanning:
    public:
      thread-pool-size: 20
      connect-timeout-ms: 10000
      handshake-timeout-ms: 15000
      retry-max-attempts: 3
      schedule-cron: "0 0 2 * * *"
    private:
      # Cron for the daily private-target sweep (RFC 0008 §6.1).
      # Offset from the public scan (02:00) and expiry sweep (08:00) to avoid
      # contention on the ShedLock window.
      schedule-cron: ${PRIVATE_SCAN_SCHEDULE_CRON:0 0 3 * * *}
      # Number of targets enqueued per transaction to bound transaction size (RFC 0008 §6.4).
      enqueue-batch-size: ${PRIVATE_SCAN_ENQUEUE_BATCH_SIZE:500}
  revocation:
    # Master switch — set false to disable all revocation checks globally.
    enabled: ${APP_REVOCATION_ENABLED:true}
    # Shadow mode (Phase 1 rollout): compute & record revocation data but do NOT set
    # CertStatus=REVOKED/INVALID and do NOT send revocation alerts. Flip to false for Phase 2.
    shadow: ${APP_REVOCATION_SHADOW:true}
    # Global failure mode: SOFT (default) or HARD.
    fail-mode: ${APP_REVOCATION_FAIL_MODE:SOFT}
    # Clock-skew tolerance for OCSP thisUpdate/nextUpdate validation.
    clock-skew-sec: ${APP_REVOCATION_CLOCK_SKEW_SEC:300}
    ocsp:
      enabled: ${APP_REVOCATION_OCSP_ENABLED:true}
      timeout-ms: ${APP_REVOCATION_OCSP_TIMEOUT_MS:4000}
      # Nonce disabled by default: responders cache responses; nonces break caching.
      use-nonce: ${APP_REVOCATION_OCSP_USE_NONCE:false}
    crl:
      enabled: ${APP_REVOCATION_CRL_ENABLED:true}
      timeout-ms: ${APP_REVOCATION_CRL_TIMEOUT_MS:8000}
      max-bytes: ${APP_REVOCATION_CRL_MAX_BYTES:5242880}
      stale-grace-hours: ${APP_REVOCATION_CRL_STALE_GRACE_HOURS:0}
      cache-ttl-minutes: ${APP_REVOCATION_CRL_CACHE_TTL_MINUTES:60}
    recheck:
      schedule-cron: ${APP_REVOCATION_RECHECK_CRON:0 0 4 * * *}
      min-age-hours: ${APP_REVOCATION_RECHECK_MIN_AGE_HOURS:20}
      batch-size: ${APP_REVOCATION_RECHECK_BATCH_SIZE:500}
  chain:
    # Trust anchor source: SYSTEM (JDK cacerts) or path to a custom KeyStore file.
    trust-store: ${APP_CHAIN_TRUST_STORE:SYSTEM}
    # Alert on untrusted chain for private targets (public targets always get advisory).
    alert-on-untrusted: ${APP_CHAIN_ALERT_ON_UNTRUSTED:false}
    # Attempt to complete incomplete chains via AIA caIssuers fetch.
    complete-via-aia: ${APP_CHAIN_COMPLETE_VIA_AIA:true}
  agent:
    offline-threshold-minutes: ${AGENT_OFFLINE_THRESHOLD_MINUTES:10}
    offline-check-interval-ms: ${AGENT_OFFLINE_CHECK_INTERVAL_MS:300000}
    # URL template for the agent JAR artifact (typically a GHCR download URL).
    # Use %s as a placeholder for the release tag (resolved from app.release-tag).
    # When blank, the controller and service fall back to streaming the JAR from
    # the classpath resource agent/certguard-agent.jar (pre-PR-3 behaviour).
    artifact-url-template: ${AGENT_ARTIFACT_URL_TEMPLATE:}
    cert:
      validity-days: 365
    bundle:
      download-url-ttl-seconds: ${AGENT_BUNDLE_DOWNLOAD_URL_TTL_SECONDS:3600}
      argon2:
        memory-kib: ${AGENT_BUNDLE_ARGON2_MEMORY_KIB:65536}
        iterations: ${AGENT_BUNDLE_ARGON2_ITERATIONS:3}
        parallelism: ${AGENT_BUNDLE_ARGON2_PARALLELISM:1}
    job:
      max-attempts: ${AGENT_JOB_MAX_ATTEMPTS:5}
      stale-claim-minutes: ${AGENT_JOB_STALE_CLAIM_MINUTES:10}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false

logging:
  level:
    com.certguard: INFO
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8443
  forward-headers-strategy: native
  servlet:
    session:
      timeout: 60s
      cookie:
        name: CGSESSION
        http-only: true
        secure: true
        same-site: lax
  ssl:
    enabled: true
    key-store: /opt/certguard/certs/certguard.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:certguard123}
    key-store-type: PKCS12
    key-alias: certguard
    enabled-protocols: TLSv1.2,TLSv1.3
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

  agent:
    ca:
      cert-path: ${AGENT_CA_CERT_PATH:/opt/certguard/certs/agent-ca.pem}
      key-path:  ${AGENT_CA_KEY_PATH:/opt/certguard/certs/agent-ca-key.pem}
    cert:
      validity-days: 365
