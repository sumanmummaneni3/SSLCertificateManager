<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Certificate Successfully Installed</title></head>
<body style="font-family:Arial,sans-serif;color:#333;max-width:600px;margin:0 auto;">
  <h2 style="color:#16a34a;">&#10003; Certificate Successfully Installed</h2>
  <p>Your renewed certificate has been successfully installed by your CertGuard agent.</p>
  <table style="width:100%;border-collapse:collapse;margin:16px 0;">
    <tr><td style="padding:8px;border:1px solid #eee;font-weight:bold;">Renewal ID</td><td style="padding:8px;border:1px solid #eee;" th:text="${renewalId}">...</td></tr>
    <tr><td style="padding:8px;border:1px solid #eee;font-weight:bold;">Install Path</td><td style="padding:8px;border:1px solid #eee;" th:text="${targetInstallPath != null ? targetInstallPath : 'N/A'}">...</td></tr>
  </table>
  <p>No further action is required. The certificate is now active on your server.</p>
  <p style="text-align:center;margin:32px 0;">
    <a th:href="${baseUrl}" style="background:#16a34a;color:#fff;padding:12px 28px;border-radius:4px;text-decoration:none;font-size:16px;">View in CertGuard</a>
  </p>
  <hr style="border:none;border-top:1px solid #eee;margin:32px 0;">
  <p style="font-size:12px;color:#999;">&mdash; CertGuard Cloud</p>
</body>
</html>
