services:

  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: certguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_DB_PASSWORD:  ${AUTH_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"   # Localhost only — not exposed to internet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # CertGuard Spring Boot Application
  # ─────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: certguard-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET:                 ${JWT_SECRET:-local-dev-secret-key-change-this-in-production-must-be-at-least-64-chars!!}
      GOOGLE_CLIENT_ID:           ${GOOGLE_CLIENT_ID:-mock-client-id}
      GOOGLE_CLIENT_SECRET:       ${GOOGLE_CLIENT_SECRET:-mock-client-secret}
      APP_BASE_URL:               ${APP_BASE_URL}
      SSL_KEYSTORE_PASSWORD:      ${SSL_KEYSTORE_PASSWORD:-localdevpassword}
      ALERT_THRESHOLD_WARNING_DAYS:  ${ALERT_THRESHOLD_WARNING_DAYS:-30}
      ALERT_THRESHOLD_CRITICAL_DAYS: ${ALERT_THRESHOLD_CRITICAL_DAYS:-7}
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseContainerSupport"
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
      APP_DEV_MODE:               ${APP_DEV_MODE:-false}
      PLATFORM_ADMIN_EMAILS:      ${PLATFORM_ADMIN_EMAILS:-}
      RENEWAL_SERVICE_URL:        http://renewal-service:8444
      INTERNAL_SERVICE_TOKEN:     ${INTERNAL_SERVICE_TOKEN:-changeme-set-in-production}
      MAIL_HOST:                  ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT:                  ${MAIL_PORT:-587}
      MAIL_USERNAME:              ${MAIL_USERNAME:-}
      MAIL_PASSWORD:              ${MAIL_PASSWORD:-}
      MAIL_FROM:                  ${MAIL_FROM:-noreply@certguard.cloud}
    ports:
      - "127.0.0.1:8443:8443"
    volumes:
      - ./certs:/opt/certguard/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O- https://localhost:8443/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # CertGuard Auth Service
  # ─────────────────────────────────────────
  auth-service:
    build:
      context: ../certguard-auth-service
      dockerfile: Dockerfile
    container_name: certguard-auth-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTH_DB_URL:                  jdbc:postgresql://postgres:5432/certguard_auth
      AUTH_DB_USERNAME:             auth_user
      AUTH_DB_PASSWORD:             ${AUTH_DB_PASSWORD}
      GOOGLE_CLIENT_ID:             ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET:         ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID:          ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET:      ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID:          ${MICROSOFT_TENANT_ID:-common}
      AUTH_CALLBACK_BASE_URL:       ${APP_BASE_URL}
      AUTH_CORS_ALLOWED_ORIGINS:    ${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      AUTH_JWT_PRIVATE_KEY_PATH:    /opt/certguard-auth/certs/jwt-private.pem
      AUTH_JWT_PUBLIC_KEY_PATH:     /opt/certguard-auth/certs/jwt-public.pem
      AUTH_JWT_EXPIRATION_MS:       ${AUTH_JWT_EXPIRATION_MS:-3600000}
      MAIN_DB_URL:                  jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      MAIN_DB_USERNAME:             ${POSTGRES_USER}
      MAIN_DB_PASSWORD:             ${POSTGRES_PASSWORD}
      PLATFORM_ADMIN_EMAILS:        ${PLATFORM_ADMIN_EMAILS:-}
      JAVA_OPTS:                    "-Xms128m -Xmx256m -XX:+UseContainerSupport"
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - auth_certs:/opt/certguard-auth/certs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # Renewal Service PostgreSQL (separate DB)
  # ─────────────────────────────────────────
  renewal-postgres:
    image: postgres:16-alpine
    container_name: certguard-renewal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${RENEWAL_POSTGRES_DB:-certguard_renewal}
      POSTGRES_USER:     ${RENEWAL_POSTGRES_USER:-renewal_user}
      POSTGRES_PASSWORD: ${RENEWAL_POSTGRES_PASSWORD}
    volumes:
      - renewal_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RENEWAL_POSTGRES_USER:-renewal_user} -d ${RENEWAL_POSTGRES_DB:-certguard_renewal}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # CertGuard Renewal Service
  # ─────────────────────────────────────────
  renewal-service:
    build:
      context: ../certguard-renewal-service
      dockerfile: Dockerfile
    container_name: certguard-renewal-service
    restart: unless-stopped
    depends_on:
      renewal-postgres:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://renewal-postgres:5432/${RENEWAL_POSTGRES_DB:-certguard_renewal}
      SPRING_DATASOURCE_USERNAME: ${RENEWAL_POSTGRES_USER:-renewal_user}
      SPRING_DATASOURCE_PASSWORD: ${RENEWAL_POSTGRES_PASSWORD}
      CORE_SERVICE_URL:           https://app:8443
      INTERNAL_SERVICE_TOKEN:     ${INTERNAL_SERVICE_TOKEN:-changeme-set-in-production}
      PACKAGE_STORAGE_PATH:       /opt/certguard-renewal/packages
      JAVA_OPTS:                  "-Xms256m -Xmx512m -XX:+UseContainerSupport"
      APP_DEV_MODE:               ${APP_DEV_MODE:-false}
    volumes:
      - renewal_packages:/opt/certguard-renewal/packages
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8444/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # Prometheus Monitoring
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: certguard-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # Grafana Dashboards
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: certguard-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # CertGuard API Gateway
  # ─────────────────────────────────────────
  gateway:
    build:
      context: ../certguard-gateway
      dockerfile: Dockerfile
    container_name: certguard-gateway
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      GATEWAY_CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      GATEWAY_DEV_MODE:             ${APP_DEV_MODE:-false}
      GATEWAY_AUTH_UPSTREAM:        http://auth-service:8090
      GATEWAY_JWKS_URI:             http://auth-service:8090/api/auth/.well-known/jwks.json
      GATEWAY_SERVER_UPSTREAM:      https://app:8443
      JAVA_OPTS:                    "-Xms128m -Xmx256m -XX:+UseContainerSupport"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # NGINX Reverse Proxy (port 443)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: certguard-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      gateway:
        condition: service_healthy
      app:
        condition: service_healthy
    networks:
      - certguard-net

# ─────────────────────────────────────────
# Named Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
  renewal_postgres_data:
  renewal_packages:
  prometheus_data:
  grafana_data:
  auth_certs:

# ─────────────────────────────────────────
# Internal Network
# ─────────────────────────────────────────
networks:
  certguard-net:
    driver: bridge
