events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS — resolves container names dynamically so nginx
    # picks up new IPs after container restarts without needing its own restart.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;

        ssl_certificate     /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Variables force nginx to re-resolve via the resolver above on each request
        # (so new container IPs are picked up without an nginx restart). Because a
        # variable proxy_pass has no URI part, append $request_uri so the full original
        # path AND query string are forwarded verbatim (e.g. ?dlToken=… bundle downloads).
        set $gateway_upstream http://gateway:8080;
        # The SPA is served by the app container from its classpath (static/), so
        # there is no separate UI container. nginx does not verify upstream TLS by
        # default, so the app's self-signed 8443 cert needs no extra config here.
        set $app_upstream      https://app:8443;

        # API, auth, agent, and actuator paths go to the gateway
        location /api {
            proxy_pass $gateway_upstream$request_uri;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /oauth2 {
            proxy_pass $gateway_upstream$request_uri;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /login {
            proxy_pass $gateway_upstream$request_uri;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /actuator {
            proxy_pass $gateway_upstream$request_uri;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /agent {
            proxy_pass $gateway_upstream$request_uri;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else is the React SPA, served by the app container
        location / {
            proxy_pass $app_upstream$request_uri;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
