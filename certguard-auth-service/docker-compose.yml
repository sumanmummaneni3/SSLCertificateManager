version: "3.9"

services:
  auth-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       certguard_auth
      POSTGRES_USER:     auth_user
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-changeme}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"        # use 5433 to avoid conflict with the main certguard DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d certguard_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: .
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_healthy
    env_file: .env
    environment:
      AUTH_DB_URL: jdbc:postgresql://auth-db:5432/certguard_auth
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
    ports:
      - "${AUTH_SERVER_PORT:-8090}:8090"
    networks:
      - default
      - certguard-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  auth_db_data:

networks:
  certguard-net:
    external: true
    name: ${CERTGUARD_NET_NAME:-certguard_certguard-net}
