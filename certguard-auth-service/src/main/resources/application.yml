spring:
  application:
    name: certguard-auth-service
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/certguard_auth}
    username: ${AUTH_DB_USERNAME:auth_user}
    password: ${AUTH_DB_PASSWORD:auth_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${AUTH_SERVER_PORT:8090}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

auth:
  dev-mode: ${AUTH_DEV_MODE:false}

  jwt:
    # REQUIRED: at least 64 characters, set via environment variable
    secret: ${AUTH_JWT_SECRET}
    expiration-seconds: ${AUTH_JWT_EXPIRATION_SECONDS:28800}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}

  microsoft:
    client-id: ${MICROSOFT_CLIENT_ID:}
    client-secret: ${MICROSOFT_CLIENT_SECRET:}
    tenant-id: ${MICROSOFT_TENANT_ID:common}

  callback:
    base-url: ${AUTH_CALLBACK_BASE_URL:http://localhost:8090}

  cors:
    # Comma-separated list of allowed origins
    allowed-origins: ${AUTH_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

  rate-limit:
    max-attempts: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:10}
    window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:300}
    cleanup-interval-ms: ${AUTH_RATE_LIMIT_CLEANUP_MS:3600000}

  session:
    cleanup-interval-ms: ${AUTH_SESSION_CLEANUP_MS:3600000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.certguard.auth: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
