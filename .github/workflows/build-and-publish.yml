name: Build and Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/certguard

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: |
          cd ui
          npm ci
          npm run build

      - name: Stage UI into server static resources
        run: |
          rm -rf server/src/main/resources/static
          mkdir -p server/src/main/resources/static
          cp -r ui/dist/. server/src/main/resources/static/

      - name: Build agent
        run: mvn clean package -q -f agent/pom.xml

      - name: Stage agent JAR into server resources
        run: |
          mkdir -p server/src/main/resources/agent
          cp agent/target/certguard-agent.jar server/src/main/resources/agent/certguard-agent.jar

      - name: Build server JAR
        run: mvn clean package -DskipTests -q -f server/pom.xml

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: server
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
