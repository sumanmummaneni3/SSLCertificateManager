# deploy.yml — Deploy pre-built GHCR images to the production VPS via SSH.
#
# This workflow does NOT build images. It triggers after build-and-publish.yml
# succeeds on main, or can be manually triggered with a specific image tag.
#
# Required GitHub Actions secrets (Settings > Secrets and variables > Actions):
#
#   VPS_HOST        — VPS IP address or hostname (e.g. 1.2.3.4 or prod.certguard.cloud)
#   VPS_USER        — SSH username on the VPS (recommend a dedicated "deploy" user,
#                     not root, with sudo limited to docker commands only)
#   VPS_SSH_KEY     — PEM-encoded ED25519 or RSA private key for SSH authentication.
#                     The corresponding public key must be in ~/.ssh/authorized_keys
#                     on the VPS under the VPS_USER account.
#
# Optional secret (for future Slack notification integration):
#   SLACK_WEBHOOK_URL — Incoming Webhook URL for deploy status notifications.
#
# VPS prerequisites:
#   - /opt/certguard is a git clone of this repository
#   - /opt/certguard/.env exists with all required variables (never committed to repo)
#   - scripts/vps-deploy.sh is executable (chmod +x /opt/certguard/scripts/vps-deploy.sh)
#   - Docker and docker compose v2 are installed
#   - VPS_USER can run docker commands (member of the docker group or via sudo)

name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy — SHA or version. Defaults to latest SHA from main."
        required: false
        default: "latest"

  workflow_run:
    workflows: ["Build and Publish"]
    types: [completed]
    branches: [main]

# Never cancel a running deploy — completing an in-flight deploy is always
# safer than leaving the VPS in a partially-upgraded state.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Only run if manually triggered, or if the upstream build workflow succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG="${{ github.event.workflow_run.head_sha }}"
          else
            TAG="latest"
          fi
          echo "Resolved image tag: ${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # The deploy script handles backup, pull, up, health checks, and cleanup.
          # It exits non-zero on any failure, which causes this step to fail.
          script: bash /opt/certguard/scripts/vps-deploy.sh ${{ steps.tag.outputs.tag }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy FAILED for tag ${{ steps.tag.outputs.tag }}."
          echo ""
          echo "To roll back to the previous known-good image, SSH into the VPS and run:"
          echo "  bash /opt/certguard/scripts/vps-rollback.sh <previous-tag>"
          echo ""
          echo "To find the previous tag:"
          echo "  docker images ghcr.io/\$GITHUB_REPOSITORY_OWNER/certguard-app --format '{{.Tag}}'"
          echo "  or check the GitHub Actions deploy run history."
          echo ""
          echo "Full rollback procedure: docs/architecture/runbooks/rollback.md"
