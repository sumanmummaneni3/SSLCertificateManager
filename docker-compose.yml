services:

  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: certguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"   # Localhost only — not exposed to internet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # RabbitMQ Message Broker (Phase 3 ready)
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: certguard-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER:  ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS:  ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./server/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "127.0.0.1:5672:5672"    # AMQP — localhost only
      - "127.0.0.1:15672:15672"  # Management UI — localhost only
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # CertGuard Spring Boot Application
  # ─────────────────────────────────────────
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: certguard-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET:                 ${JWT_SECRET:-local-dev-secret-key-change-this-in-production-must-be-at-least-64-chars!!}
      GOOGLE_CLIENT_ID:           ${GOOGLE_CLIENT_ID:-mock-client-id}
      GOOGLE_CLIENT_SECRET:       ${GOOGLE_CLIENT_SECRET:-mock-client-secret}
      RABBITMQ_HOST:              rabbitmq
      RABBITMQ_DEFAULT_USER:      ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS:      ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_VHOST:             ${RABBITMQ_VHOST}
      APP_BASE_URL:               ${APP_BASE_URL}
      SSL_KEYSTORE_PASSWORD:      ${SSL_KEYSTORE_PASSWORD:-localdevpassword}
      ALERT_THRESHOLD_WARNING_DAYS:  ${ALERT_THRESHOLD_WARNING_DAYS:-30}
      ALERT_THRESHOLD_CRITICAL_DAYS: ${ALERT_THRESHOLD_CRITICAL_DAYS:-7}
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseContainerSupport"
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
      APP_DEV_MODE:               ${APP_DEV_MODE:-false}
      PLATFORM_ADMIN_EMAILS:      ${PLATFORM_ADMIN_EMAILS:-}
      MAIL_HOST:                  ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT:                  ${MAIL_PORT:-587}
      MAIL_USERNAME:              ${MAIL_USERNAME:-}
      MAIL_PASSWORD:              ${MAIL_PASSWORD:-}
      MAIL_FROM:                  ${MAIL_FROM:-noreply@certguard.cloud}
      AGENT_ARTIFACT_URL_TEMPLATE: ${AGENT_ARTIFACT_URL_TEMPLATE:-}
      APP_RELEASE_TAG:              ${APP_RELEASE_TAG:-latest}
    ports:
      - "127.0.0.1:8443:8443"
    volumes:
      - ./server/certs:/opt/certguard/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O- https://localhost:8443/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # Prometheus Monitoring
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: certguard-prometheus
    restart: unless-stopped
    volumes:
      - ./server/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # Grafana Dashboards
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: certguard-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./server/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./server/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # CertGuard API Gateway
  # ─────────────────────────────────────────
  gateway:
    build:
      context: ./certguard-gateway
      dockerfile: Dockerfile
    container_name: certguard-gateway
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      # Must equal JWT_SECRET so the gateway and the server share the same HS256 signing key.
      AUTH_JWT_SECRET:              ${JWT_SECRET}
      GATEWAY_CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      GATEWAY_DEV_MODE:             ${APP_DEV_MODE:-false}
      # auth-service runs in its own separate compose stack and is not on certguard-net.
      # Override GATEWAY_AUTH_UPSTREAM in .env when you want to connect them.
      GATEWAY_AUTH_UPSTREAM:        ${GATEWAY_AUTH_UPSTREAM:-http://localhost:8090}
      GATEWAY_SERVER_UPSTREAM:      https://app:8443
      JAVA_OPTS:                    "-Xms128m -Xmx256m -XX:+UseContainerSupport"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # CertGuard UI (React SPA served by nginx)
  # ─────────────────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: certguard-ui
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ | grep -q 'id=\"root\"' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - certguard-net

  # ─────────────────────────────────────────
  # NGINX Reverse Proxy (port 443)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: certguard-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./server/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./server/certs:/etc/nginx/certs:ro
    depends_on:
      gateway:
        condition: service_healthy
      ui:
        condition: service_healthy
    networks:
      - certguard-net

# ─────────────────────────────────────────
# Named Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

# ─────────────────────────────────────────
# Internal Network
# ─────────────────────────────────────────
networks:
  certguard-net:
    driver: bridge
