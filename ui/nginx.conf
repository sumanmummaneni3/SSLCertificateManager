server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so upstream hostnames are resolved at request
    # time rather than startup — prevents "host not found in upstream" crashes
    # when the gateway container hasn't registered with DNS yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA fallback: unknown paths resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy: API routes to the Spring WebFlux gateway
    location /api {
        set $gw http://gateway:8080;
        proxy_pass $gw;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /oauth2 {
        set $gw http://gateway:8080;
        proxy_pass $gw;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /login {
        set $gw http://gateway:8080;
        proxy_pass $gw;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
