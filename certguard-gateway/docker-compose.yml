services:

  # ─────────────────────────────────────────
  # CertGuard API Gateway
  # ─────────────────────────────────────────
  certguard-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: certguard-gateway
    restart: unless-stopped
    environment:
      # REQUIRED: must be at least 64 characters and match AUTH_JWT_SECRET in auth-service
      AUTH_JWT_SECRET:                 ${AUTH_JWT_SECRET}
      # Comma-separated allowed CORS origins (no wildcard in production)
      GATEWAY_CORS_ALLOWED_ORIGINS:    ${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      GATEWAY_DEV_MODE:                ${GATEWAY_DEV_MODE:-false}
      JAVA_OPTS:                       "-Xms128m -Xmx256m -XX:+UseContainerSupport"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # certguard-auth-service is expected to be running externally (separate compose stack).
    # If running together, add a `depends_on` entry and declare the shared network here.

